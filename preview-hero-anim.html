<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Animation Preview</title>
  <style>
    /* ========================================================
       ドットアニメーション設定値
       ここの値を変えるだけで見た目が変わります
    ======================================================== */
    :root {
      --dot-color:      255, 61, 27; /* RGB値 (#FF3D1B) */
      --dot-opacity:    0.5;         /* 透明度 0〜1 */
      --dot-base-size:  1.4;         /* ドット基本サイズ (px) */
      --dot-spacing:    28;          /* ドット間隔 (px) */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111111;
      font-family: 'Jost', sans-serif;
      overflow: hidden;
    }

    /* Hero 全画面 */
    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #111111;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
    }

    /* Canvas: 全面・ポインターイベント無効（コンテンツを塞がない）*/
    #heroCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ダミーテキスト（実際のヒーローコンテンツに近い見た目） */
    .hero__content {
      position: relative;
      z-index: 1;
      padding: 0 127px;
    }

    .hero__title {
      font-size: clamp(60px, 8vw, 120px);
      font-weight: 800;
      font-style: italic;
      text-transform: uppercase;
      color: #FF3D1B;
      line-height: 1;
      margin-bottom: 32px;
    }

    .hero__sub {
      font-size: 20px;
      font-weight: 300;
      color: #E2E2E2;
    }

    /* 右下ラベル */
    .label {
      position: fixed;
      bottom: 24px;
      right: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.1em;
      z-index: 10;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,300;1,800&display=swap" rel="stylesheet"/>
</head>
<body>

<section class="hero">
  <canvas id="heroCanvas"></canvas>

  <div class="hero__content">
    <h1 class="hero__title">Designer who thinks<br>like a Director.</h1>
    <p class="hero__sub">デザインの精度で、ディレクションを実現する</p>
  </div>
</section>

<p class="label">PREVIEW — マウスを動かしてください (PC のみ反応)</p>

<script>
'use strict';

(function () {
  const canvas = document.getElementById('heroCanvas');
  const ctx    = canvas.getContext('2d');

  /* -------- CSS変数から設定値を読み込む ---------------------- */
  const css      = getComputedStyle(document.documentElement);
  const _color   = css.getPropertyValue('--dot-color').trim();    // "255, 61, 27"
  const _opacity = css.getPropertyValue('--dot-opacity').trim();  // "0.5"
  const _size    = css.getPropertyValue('--dot-base-size').trim();// "1.4"
  const _spacing = css.getPropertyValue('--dot-spacing').trim();  // "28"

  const DOT_COLOR = `rgba(${_color}, ${_opacity})`;
  const BASE_R    = parseFloat(_size);
  const SPACING   = parseFloat(_spacing);

  /* -------- JS側固定値（必要に応じてCSSへ移行可） ----------- */
  const WAVE_AMP     = 2.6;   // 波の振幅
  const WAVE_SPEED   = 0.7;   // 波のスピード
  const WAVE_FREQ_X  = 0.018; // 横方向の波周波数
  const WAVE_FREQ_Y  = 0.018; // 縦方向の波周波数
  const MOUSE_R      = 160;   // マウス影響半径 (px)
  const MOUSE_BOOST  = 9;     // マウス近傍の最大追加半径

  /* -------- 状態 --------------------------------------------- */
  let dots  = [];
  let mouse = { x: -9999, y: -9999 };
  let isPC  = window.innerWidth >= 1025;
  let rafId = null;

  /* -------- ドット初期化 ------------------------------------- */
  function buildDots() {
    dots = [];
    const cols = Math.ceil(canvas.width  / SPACING) + 2;
    const rows = Math.ceil(canvas.height / SPACING) + 2;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        dots.push({
          x:      c * SPACING,
          y:      r * SPACING,
          phase:  Math.random() * Math.PI * 2, // ランダム位相でより自然な波に
        });
      }
    }
  }

  /* -------- リサイズ ----------------------------------------- */
  function resize() {
    canvas.width  = canvas.offsetWidth  || window.innerWidth;
    canvas.height = canvas.offsetHeight || window.innerHeight;
    isPC = window.innerWidth >= 1025;
    buildDots();
  }

  /* -------- アニメーションループ ------------------------------ */
  function animate(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const now = t * 0.001 * WAVE_SPEED;

    for (let i = 0, len = dots.length; i < len; i++) {
      const d = dots[i];

      /* 波: 位置 + 個別位相でディレイ感を出す */
      const wave = Math.sin(now + d.x * WAVE_FREQ_X + d.y * WAVE_FREQ_Y + d.phase) * WAVE_AMP;
      let r = BASE_R + wave;

      /* マウス反応 (PC のみ) */
      if (isPC) {
        const dx   = d.x - mouse.x;
        const dy   = d.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < MOUSE_R) {
          r += (1 - dist / MOUSE_R) * MOUSE_BOOST;
        }
      }

      r = Math.max(0.3, r);

      ctx.beginPath();
      ctx.arc(d.x, d.y, r, 0, Math.PI * 2);
      ctx.fillStyle = DOT_COLOR;
      ctx.fill();
    }

    rafId = requestAnimationFrame(animate);
  }

  /* -------- イベント ----------------------------------------- */
  // マウス位置：canvas ではなく hero に対して取得
  document.addEventListener('mousemove', e => {
    if (!isPC) return;
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
  });

  document.addEventListener('mouseleave', () => {
    mouse.x = -9999;
    mouse.y = -9999;
  });

  window.addEventListener('resize', () => {
    resize();
  });

  /* -------- 起動 --------------------------------------------- */
  resize();
  rafId = requestAnimationFrame(animate);
})();
</script>
</body>
</html>
